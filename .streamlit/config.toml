[theme]
base = "dark"
primaryColor = "#00ff88"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1e2130"
textColor = "#fafafa"
font = "monospace"

[server]
headless = true
enableCORS = false

[browser]
gatherUsageStats = false


# .streamlit/config.toml — StratFlow
# Explicitly forces the sidebar page navigation ON. This file exists to
# override any stray configuration that silently hides the nav
# (client.showSidebarNavigation = false produces exactly that symptom:
# no sidebar, no errors). Secrets do NOT belong in this file — they live
# only in Streamlit Cloud → Settings → Secrets.

[client]
showSidebarNavigation = true
showErrorDetails = true
